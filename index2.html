<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>リズムもぐらたたき DX</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@900&display=swap');

  :root {
    --primary: #ffcc00;
    --accent: #ff44aa;
    --bg-dark: #1a0a2e;
  }

  body {
    font-family: 'M PLUS Rounded 1c', sans-serif;
    background: #0a0520;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    color: white;
    overflow: hidden;
  }

  #app {
    width: 100%;
    max-width: 450px;
    height: 700px;
    background: linear-gradient(180deg, #1a0a2e 0%, #2a1a4e 100%);
    border-radius: 30px;
    position: relative;
    box-shadow: 0 0 50px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
  }

  /* ヘッダー */
  #hud {
    display: flex;
    justify-content: space-around;
    padding: 20px;
    z-index: 10;
  }
  .stat-box {
    background: rgba(0,0,0,0.5);
    padding: 10px 20px;
    border-radius: 15px;
    border: 2px solid var(--accent);
    text-align: center;
  }
  .label { font-size: 12px; color: var(--accent); }
  .value { font-size: 24px; color: var(--primary); }

  /* 判定 */
  #judge {
    height: 60px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 32px;
    text-shadow: 0 0 10px rgba(255,255,255,0.5);
  }

  /* ゲームエリア */
  #game-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 30px;
    padding: 20px;
    flex-grow: 1;
  }

  .hole {
    aspect-ratio: 1.2;
    background: #3a1a08;
    border-radius: 50% / 30%;
    position: relative;
    border: 6px solid #1a0a00;
    box-shadow: inset 0 10px 20px rgba(0,0,0,0.8);
    /* もぐらがはみ出さないように */
    overflow: hidden; 
  }

  .mole {
    width: 80%;
    position: absolute;
    bottom: -100%; /* 最初は隠れている */
    left: 10%;
    transition: bottom 0.1s cubic-bezier(0.18, 0.89, 0.32, 1.28);
    pointer-events: none; /* 穴のクリックを邪魔しない */
  }

  .hole.active .mole {
    bottom: 10%; /* 出現時 */
  }

  /* 叩いた時のアニメーション */
  .hit-shake {
    animation: shake 0.2s;
  }
  @keyframes shake {
    0% { transform: scale(1); }
    50% { transform: scale(0.8) rotate(10deg); }
    100% { transform: scale(1); }
  }

  /* タイミングバー */
  #timing-container {
    padding: 20px;
    text-align: center;
  }
  #track {
    height: 10px;
    background: rgba(255,255,255,0.2);
    border-radius: 5px;
    position: relative;
  }
  #marker {
    width: 20px;
    height: 20px;
    background: white;
    border-radius: 50%;
    position: absolute;
    top: -5px;
    left: 0;
    transform: translateX(-50%);
    box-shadow: 0 0 10px white;
  }

  /* オーバーレイ */
  .overlay {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.9);
    z-index: 100;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    border-radius: 30px;
  }
  .btn {
    background: var(--accent);
    color: white;
    border: none;
    padding: 15px 40px;
    font-size: 24px;
    border-radius: 50px;
    cursor: pointer;
    font-family: inherit;
    margin-top: 20px;
  }
</style>
</head>
<body>

<div id="app">
  <div id="hud">
    <div class="stat-box">
      <div class="label">SCORE</div>
      <div id="score" class="value">0</div>
    </div>
    <div class="stat-box">
      <div class="label">COMBO</div>
      <div id="combo" class="value">0</div>
    </div>
  </div>

  <div id="judge"><span id="judge-text"></span></div>

  <div id="game-grid">
    <!-- 穴ともぐら -->
    <div class="hole" onclick="tap(0)"><img src="https://r2.community.elemental.video/2025/05/01/a02f3922-0d19-4977-8f55-64998c0d5402/original.png" class="mole" id="mole0"></div>
    <div class="hole" onclick="tap(1)"><img src="https://r2.community.elemental.video/2025/05/01/a02f3922-0d19-4977-8f55-64998c0d5402/original.png" class="mole" id="mole1"></div>
    <div class="hole" onclick="tap(2)"><img src="https://r2.community.elemental.video/2025/05/01/a02f3922-0d19-4977-8f55-64998c0d5402/original.png" class="mole" id="mole2"></div>
    <div class="hole" onclick="tap(3)"><img src="https://r2.community.elemental.video/2025/05/01/a02f3922-0d19-4977-8f55-64998c0d5402/original.png" class="mole" id="mole3"></div>
  </div>

  <div id="timing-container">
    <div id="track"><div id="marker"></div></div>
    <p style="font-size: 12px; margin-top: 10px;">リズムに合わせて叩け！</p>
  </div>

  <!-- スタート画面 -->
  <div id="start-screen" class="overlay">
    <h1 style="color: var(--primary);">もぐら Rhythm</h1>
    <button class="btn" onclick="startGame()">START</button>
  </div>

  <!-- リザルト画面 -->
  <div id="result-screen" class="overlay" style="display:none;">
    <h1 id="final-msg">FINISH!</h1>
    <div id="final-score" style="font-size: 40px; color: var(--primary);">0</div>
    <button class="btn" onclick="location.reload()">RETRY</button>
  </div>
</div>

<script>
const BPM = 125;
const BEAT_MS = 60000 / BPM;
let score = 0;
let combo = 0;
let gameActive = false;
let currentTarget = -1;
let nextBeatTime = 0;

const holes = document.querySelectorAll('.hole');
const moles = document.querySelectorAll('.mole');
const marker = document.getElementById('marker');
const judgeEl = document.getElementById('judge-text');

function startGame() {
  document.getElementById('start-screen').style.display = 'none';
  gameActive = true;
  nextBeatTime = performance.now() + BEAT_MS;
  spawnMole();
  requestAnimationFrame(loop);
  
  // 30秒で終了
  setTimeout(endGame, 30000);
}

function spawnMole() {
  if(!gameActive) return;
  
  // 以前のターゲットを消去
  holes.forEach(h => h.classList.remove('active'));
  
  // 新しい場所に出現
  currentTarget = Math.floor(Math.random() * 4);
  holes[currentTarget].classList.add('active');
  
  // 次の拍でまた出現させる
  setTimeout(spawnMole, BEAT_MS);
}

function tap(id) {
  if(!gameActive) return;
  
  const now = performance.now();
  const diff = Math.abs(now - nextBeatTime);
  
  // ヒット判定
  if(id === currentTarget && holes[id].classList.contains('active')) {
    // もぐらを引っ込める & アニメーション
    holes[id].classList.remove('active');
    moles[id].classList.add('hit-shake');
    setTimeout(() => moles[id].classList.remove('hit-shake'), 200);

    if(diff < 100) {
      updateScore("PERFECT", 500);
    } else if(diff < 250) {
      updateScore("GOOD", 200);
    } else {
      updateScore("MISS", 0);
    }
  } else {
    updateScore("MISS", 0);
  }
}

function updateScore(msg, pts) {
  if(pts > 0) {
    combo++;
    score += pts + (combo * 10);
    judgeEl.style.color = pts === 500 ? "#ffcc00" : "#44ffaa";
  } else {
    combo = 0;
    judgeEl.style.color = "#ff4444";
  }
  
  judgeEl.innerText = msg;
  document.getElementById('score').innerText = score;
  document.getElementById('combo').innerText = combo;
}

function loop(time) {
  if(!gameActive) return;

  // タイミングバーの更新
  if(time >= nextBeatTime) {
    nextBeatTime += BEAT_MS;
  }
  
  const progress = 1 - ((nextBeatTime - time) / BEAT_MS);
  marker.style.left = (progress * 100) + "%";
  
  requestAnimationFrame(loop);
}

function endGame() {
  gameActive = false;
  document.getElementById('result-screen').style.display = 'flex';
  document.getElementById('final-score').innerText = "Score: " + score;
}
</script>
</body>
</html>
